  <text x="652" y="528" font-family="'Helvetica Neue',sans-serif" font-size="11" fill="#c9a84c" letter-spacing="2" text-anchor="middle">BOOK SESSION</text>
  <!-- Gallery grid preview -->
  <rect y="552" width="1200" height="348" fill="#0a0a0a"/>
  <rect x="4" y="560" width="498" height="200" fill="#1a1409"/>
  <rect x="506" y="560" width="242" height="96" fill="#091213"/>
  <rect x="752" y="560" width="192" height="96" fill="#130d09"/>
  <rect x="948" y="560" width="248" height="96" fill="#0d0d13"/>
  <rect x="506" y="660" width="242" height="96" fill="#091309"/>
  <rect x="752" y="660" width="192" height="96" fill="#130913"/>
